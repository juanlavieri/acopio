# One-click deploy to Render (https://render.com) — same playbook as crypto-pay-poc.
# 1. Push this repo to GitHub.
# 2. Render Dashboard -> New -> Blueprint -> pick the repo.
# 3. (Optional) Add your OPENAI_API_KEY in the service's Environment tab to turn
#    on the AI assistant, smart normalization and voice transcription.
# 4. Deploy. You get a public https://<name>.onrender.com URL — no domain needed.

databases:
  - name: acopio-db
    plan: free
    databaseName: acopio
    user: acopio

services:
  - type: web
    name: acopio
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      # Signs session tokens — auto-generated, never commit a real one.
      - key: SECRET_KEY
        generateValue: true
      # Collection-center country/region seeded on first run.
      - key: DEFAULT_COUNTRY
        value: Curaçao
      - key: DEFAULT_REGION
        value: Curaçao
      - key: DEFAULT_CENTER
        value: Centro Principal
      # First country manager — auto-created on a fresh database.
      # Set these in the Render dashboard (kept out of this public repo):
      #   BOOTSTRAP_ADMIN_EMAIL     e.g. marygoiri@gmail.com
      #   BOOTSTRAP_ADMIN_NAME      e.g. Maryanne Goiri
      #   BOOTSTRAP_ADMIN_PASSWORD  the chosen password
      # (Or skip them and just register the first account in the UI.)
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_NAME
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      # Optional super admin (manages all tenants). Set in the dashboard.
      - key: BOOTSTRAP_SUPERADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_SUPERADMIN_NAME
        sync: false
      - key: BOOTSTRAP_SUPERADMIN_PASSWORD
        sync: false
      # Postgres connection string, injected from the managed database above.
      - key: DATABASE_URL
        fromDatabase:
          name: acopio-db
          property: connectionString
      # Paste your key in the dashboard to enable AI features (kept out of git).
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
